      const [laneOffset, setLaneOffset] = useState(0);
      const [chunkTimings, setChunkTimings] = useState([]);
      const [chunkStartedAt, setChunkStartedAt] = useState(null);
      const [finalWpm, setFinalWpm] = useState(0);
      const [finalFlow, setFinalFlow] = useState(100);
      const [hasFinished, setHasFinished] = useState(false);
      const [autoWpm, setAutoWpm] = useState(null);
      const [copyNotice, setCopyNotice] = useState(false);
      const [showAnchorDot, setShowAnchorDot] = useState(true);
      const [anchorDotColor, setAnchorDotColor] = useState("#22d3ee");
      const [countdownValue, setCountdownValue] = useState(null);

      const [selectedStory, setSelectedStory] = useState("");
      const BASE_WIDTH = 1120;
      const BASE_HEIGHT = 720;
      const [uiScale, setUiScale] = useState(1);

      useLayoutEffect(() => {
        const updateScale = () => {
          if (document.fullscreenElement) {
            setUiScale(1);
            return;
          }
          const padX = 24;
          const padY = 24;
          const availableWidth = Math.max(320, window.innerWidth - padX * 2);
          const availableHeight = Math.max(320, window.innerHeight - padY * 2);
          const nextScale = Math.min(availableWidth / BASE_WIDTH, availableHeight / BASE_HEIGHT);
          setUiScale(nextScale);
        };

        updateScale();
        window.addEventListener("resize", updateScale);
        document.addEventListener("fullscreenchange", updateScale);
        return () => {
          window.removeEventListener("resize", updateScale);
          document.removeEventListener("fullscreenchange", updateScale);
        };
      }, []);


      const storyPresets = useMemo(() => ([
        { id: "story1", label: "Story 1 – Dracula Ch.2 (<1 min @400 WPM)", lesson: `Chapter II

Jonathan Harker arrives at a castle in the Carpathian mountains.

The driver shows prodigious strength and vanishes into the dark courtyard.

Harker waits before the great door, filled with doubt and fear.

The door opens.

A tall old man appears, holding a lamp.

He says:

“Welcome to my house. Enter freely.”

The man grasps Harker’s hand with icy strength.

He introduces himself:

“I am Count Dracula.”

Dracula welcomes Harker into the castle.

He provides a bedroom, fire, and supper.

While Harker eats, the Count questions him about his journey.

Harker observes the Count’s face:

sharp teeth
extraordinary pallor
long pointed nails

A feeling of nausea comes over him.

Outside, wolves howl.

Dracula says:

“Listen to the children of the night.”

Morning approaches.

The Count disappears.

Later Harker wakes.

He finds no servants.

The castle contains wealth, ancient furnishings, but no mirrors.

In the library the Count studies England.

Dracula says he wishes to live in London.

They discuss the estate at Purfleet.

Dracula reveals he wants to walk London streets and blend among men.

Harker begins to feel the castle is strange.

That night, while shaving, something terrifying happens.

Dracula appears behind him.

But in the mirror there is no reflection.

Harker cuts himself.

Dracula lunges toward the blood.

The crucifix stops him.

Dracula throws the mirror out the window.

Later Harker explores.

Every door is locked.

The castle stands above a terrible precipice.

At last he realizes the truth:

The castle is a prison.

Harker is a prisoner.` },
        { id: "story2", label: "Story 2 – Frankenstein Ch.24 (~10 min @400 WPM)", lesson: `Chapter 24
My present situation was one in which all voluntary thought was swallowed up and lost. I was hurried away by fury; revenge alone endowed me with strength and composure; it moulded my feelings and allowed me to be calculating and calm at periods when otherwise delirium or death would have been my portion.

My first resolution was to quit Geneva for ever; my country, which, when I was happy and beloved, was dear to me, now, in my adversity, became hateful. I provided myself with a sum of money, together with a few jewels which had belonged to my mother, and departed.

And now my wanderings began which are to cease but with life. I have traversed a vast portion of the earth and have endured all the hardships which travellers in deserts and barbarous countries are wont to meet. How I have lived I hardly know; many times have I stretched my failing limbs upon the sandy plain and prayed for death. But revenge kept me alive; I dared not die and leave my adversary in being.

When I quitted Geneva my first labour was to gain some clue by which I might trace the steps of my fiendish enemy. But my plan was unsettled, and I wandered many hours round the confines of the town, uncertain what path I should pursue. As night approached I found myself at the entrance of the cemetery where William, Elizabeth, and my father reposed. I entered it and approached the tomb which marked their graves. Everything was silent except the leaves of the trees, which were gently agitated by the wind; the night was nearly dark, and the scene would have been solemn and affecting even to an uninterested observer. The spirits of the departed seemed to flit around and to cast a shadow, which was felt but not seen, around the head of the mourner.

The deep grief which this scene had at first excited quickly gave way to rage and despair. They were dead, and I lived; their murderer also lived, and to destroy him I must drag out my weary existence. I knelt on the grass and kissed the earth and with quivering lips exclaimed, “By the sacred earth on which I kneel, by the shades that wander near me, by the deep and eternal grief that I feel, I swear; and by thee, O Night, and the spirits that preside over thee, to pursue the dæmon who caused this misery, until he or I shall perish in mortal conflict. For this purpose I will preserve my life; to execute this dear revenge will I again behold the sun and tread the green herbage of earth, which otherwise should vanish from my eyes for ever. And I call on you, spirits of the dead, and on you, wandering ministers of vengeance, to aid and conduct me in my work. Let the cursed and hellish monster drink deep of agony; let him feel the despair that now torments me.”

I had begun my adjuration with solemnity and an awe which almost assured me that the shades of my murdered friends heard and approved my devotion, but the furies possessed me as I concluded, and rage choked my utterance.

I was answered through the stillness of night by a loud and fiendish laugh. It rang on my ears long and heavily; the mountains re-echoed it, and I felt as if all hell surrounded me with mockery and laughter. Surely in that moment I should have been possessed by frenzy and have destroyed my miserable existence but that my vow was heard and that I was reserved for vengeance. The laughter died away, when a well-known and abhorred voice, apparently close to my ear, addressed me in an audible whisper, “I am satisfied, miserable wretch! You have determined to live, and I am satisfied.”

I darted towards the spot from which the sound proceeded, but the devil eluded my grasp. Suddenly the broad disk of the moon arose and shone full upon his ghastly and distorted shape as he fled with more than mortal speed.

I pursued him, and for many months this has been my task. Guided by a slight clue, I followed the windings of the Rhone, but vainly. The blue Mediterranean appeared, and by a strange chance, I saw the fiend enter by night and hide himself in a vessel bound for the Black Sea. I took my passage in the same ship, but he escaped, I know not how.

Amidst the wilds of Tartary and Russia, although he still evaded me, I have ever followed in his track. Sometimes the peasants, scared by this horrid apparition, informed me of his path; sometimes he himself, who feared that if I lost all trace of him I should despair and die, left some mark to guide me. The snows descended on my head, and I saw the print of his huge step on the white plain. To you first entering on life, to whom care is new and agony unknown, how can you understand what I have felt and still feel? Cold, want, and fatigue were the least pains which I was destined to endure; I was cursed by some devil and carried about with me my eternal hell; yet still a spirit of good followed and directed my steps and when I most murmured would suddenly extricate me from seemingly insurmountable difficulties. Sometimes, when nature, overcome by hunger, sank under the exhaustion, a repast was prepared for me in the desert that restored and inspirited me. The fare was, indeed, coarse, such as the peasants of the country ate, but I will not doubt that it was set there by the spirits that I had invoked to aid me. Often, when all was dry, the heavens cloudless, and I was parched by thirst, a slight cloud would bedim the sky, shed the few drops that revived me, and vanish.

I followed, when I could, the courses of the rivers; but the dæmon generally avoided these, as it was here that the population of the country chiefly collected. In other places human beings were seldom seen, and I generally subsisted on the wild animals that crossed my path. I had money with me and gained the friendship of the villagers by distributing it; or I brought with me some food that I had killed, which, after taking a small part, I always presented to those who had provided me with fire and utensils for cooking.

My life, as it passed thus, was indeed hateful to me, and it was during sleep alone that I could taste joy. O blessed sleep! Often, when most miserable, I sank to repose, and my dreams lulled me even to rapture. The spirits that guarded me had provided these moments, or rather hours, of happiness that I might retain strength to fulfil my pilgrimage. Deprived of this respite, I should have sunk under my hardships. During the day I was sustained and inspirited by the hope of night, for in sleep I saw my friends, my wife, and my beloved country; again I saw the benevolent countenance of my father, heard the silver tones of my Elizabeth’s voice, and beheld Clerval enjoying health and youth. Often, when wearied by a toilsome march, I persuaded myself that I was dreaming until night should come and that I should then enjoy reality in the arms of my dearest friends. What agonising fondness did I feel for them! How did I cling to their dear forms, as sometimes they haunted even my waking hours, and persuade myself that they still lived! At such moments vengeance, that burned within me, died in my heart, and I pursued my path towards the destruction of the dæmon more as a task enjoined by heaven, as the mechanical impulse of some power of which I was unconscious, than as the ardent desire of my soul.

What his feelings were whom I pursued I cannot know. Sometimes, indeed, he left marks in writing on the barks of the trees or cut in stone that guided me and instigated my fury. “My reign is not yet over”—these words were legible in one of these inscriptions—“you live, and my power is complete. Follow me; I seek the everlasting ices of the north, where you will feel the misery of cold and frost, to which I am impassive. You will find near this place, if you follow not too tardily, a dead hare; eat and be refreshed. Come on, my enemy; we have yet to wrestle for our lives, but many hard and miserable hours must you endure until that period shall arrive.”

Scoffing devil! Again do I vow vengeance; again do I devote thee, miserable fiend, to torture and death. Never will I give up my search until he or I perish; and then with what ecstasy shall I join my Elizabeth and my departed friends, who even now prepare for me the reward of my tedious toil and horrible pilgrimage!

As I still pursued my journey to the northward, the snows thickened and the cold increased in a degree almost too severe to support. The peasants were shut up in their hovels, and only a few of the most hardy ventured forth to seize the animals whom starvation had forced from their hiding-places to seek for prey. The rivers were covered with ice, and no fish could be procured; and thus I was cut off from my chief article of maintenance.

The triumph of my enemy increased with the difficulty of my labours. One inscription that he left was in these words: “Prepare! Your toils only begin; wrap yourself in furs and provide food, for we shall soon enter upon a journey where your sufferings will satisfy my everlasting hatred.”

My courage and perseverance were invigorated by these scoffing words; I resolved not to fail in my purpose, and calling on Heaven to support me, I continued with unabated fervour to traverse immense deserts, until the ocean appeared at a distance and formed the utmost boundary of the horizon. Oh! How unlike it was to the blue seasons of the south! Covered with ice, it was only to be distinguished from land by its superior wildness and ruggedness. The Greeks wept for joy when they beheld the Mediterranean from the hills of Asia, and hailed with rapture the boundary of their toils. I did not weep, but I knelt down and with a full heart thanked my guiding spirit for conducting me in safety to the place where I hoped, notwithstanding my adversary’s gibe, to meet and grapple with him.

Some weeks before this period I had procured a sledge and dogs and thus traversed the snows with inconceivable speed. I know not whether the fiend possessed the same advantages, but I found that, as before I had daily lost ground in the pursuit, I now gained on him, so much so that when I first saw the ocean he was but one day’s journey in advance, and I hoped to intercept him before he should reach the beach. With new courage, therefore, I pressed on, and in two days arrived at a wretched hamlet on the seashore. I inquired of the inhabitants concerning the fiend and gained accurate information. A gigantic monster, they said, had arrived the night before, armed with a gun and many pistols, putting to flight the inhabitants of a solitary cottage through fear of his terrific appearance. He had carried off their store of winter food, and placing it in a sledge, to draw which he had seized on a numerous drove of trained dogs, he had harnessed them, and the same night, to the joy of the horror-struck villagers, had pursued his journey across the sea in a direction that led to no land; and they conjectured that he must speedily be destroyed by the breaking of the ice or frozen by the eternal frosts.

On hearing this information I suffered a temporary access of despair. He had escaped me, and I must commence a destructive and almost endless journey across the mountainous ices of the ocean, amidst cold that few of the inhabitants could long endure and which I, the native of a genial and sunny climate, could not hope to survive. Yet at the idea that the fiend should live and be triumphant, my rage and vengeance returned, and like a mighty tide, overwhelmed every other feeling. After a slight repose, during which the spirits of the dead hovered round and instigated me to toil and revenge, I prepared for my journey.

I exchanged my land-sledge for one fashioned for the inequalities of the Frozen Ocean, and purchasing a plentiful stock of provisions, I departed from land.

I cannot guess how many days have passed since then, but I have endured misery which nothing but the eternal sentiment of a just retribution burning within my heart could have enabled me to support. Immense and rugged mountains of ice often barred up my passage, and I often heard the thunder of the ground sea, which threatened my destruction. But again the frost came and made the paths of the sea secure.

By the quantity of provision which I had consumed, I should guess that I had passed three weeks in this journey; and the continual protraction of hope, returning back upon the heart, often wrung bitter drops of despondency and grief from my eyes. Despair had indeed almost secured her prey, and I should soon have sunk beneath this misery. Once, after the poor animals that conveyed me had with incredible toil gained the summit of a sloping ice mountain, and one, sinking under his fatigue, died, I viewed the expanse before me with anguish, when suddenly my eye caught a dark speck upon the dusky plain. I strained my sight to discover what it could be and uttered a wild cry of ecstasy when I distinguished a sledge and the distorted proportions of a well-known form within. Oh! With what a burning gush did hope revisit my heart! Warm tears filled my eyes, which I hastily wiped away, that they might not intercept the view I had of the dæmon; but still my sight was dimmed by the burning drops, until, giving way to the emotions that oppressed me, I wept aloud.

But this was not the time for delay; I disencumbered the dogs of their dead companion, gave them a plentiful portion of food, and after an hour’s rest, which was absolutely necessary, and yet which was bitterly irksome to me, I continued my route. The sledge was still visible, nor did I again lose sight of it except at the moments when for a short time some ice-rock concealed it with its intervening crags. I indeed perceptibly gained on it, and when, after nearly two days’ journey, I beheld my enemy at no more than a mile distant, my heart bounded within me.

But now, when I appeared almost within grasp of my foe, my hopes were suddenly extinguished, and I lost all trace of him more utterly than I had ever done before. A ground sea was heard; the thunder of its progress, as the waters rolled and swelled beneath me, became every moment more ominous and terrific. I pressed on, but in vain. The wind arose; the sea roared; and, as with the mighty shock of an earthquake, it split and cracked with a tremendous and overwhelming sound. The work was soon finished; in a few minutes a tumultuous sea rolled between me and my enemy, and I was left drifting on a scattered piece of ice that was continually lessening and thus preparing for me a hideous death.

In this manner many appalling hours passed; several of my dogs died, and I myself was about to sink under the accumulation of distress when I saw your vessel riding at anchor and holding forth to me hopes of succour and life. I had no conception that vessels ever came so far north and was astounded at the sight. I quickly destroyed part of my sledge to construct oars, and by these means was enabled, with infinite fatigue, to move my ice raft in the direction of your ship. I had determined, if you were going southwards, still to trust myself to the mercy of the seas rather than abandon my purpose. I hoped to induce you to grant me a boat with which I could pursue my enemy. But your direction was northwards. You took me on board when my vigour was exhausted, and I should soon have sunk under my multiplied hardships into a death which I still dread, for my task is unfulfilled.` },
        { id: "story3", label: "Story 3 – Invisible Man (<1 min @400 WPM)", lesson: `THE STRANGE MAN'S ARRIVAL

The stranger arrives on a wintry February day, walking from Bramblehurst railway station, carrying a black portmanteau.

He is wrapped from head to foot, his face hidden, with only the tip of his nose visible.

He stumbles into the Coach and Horses inn.

“A fire,” he cries. “A room and a fire!”

He takes a room after placing sovereigns on the table.

Mrs. Hall prepares a meal for the new guest.

The stranger stands staring out the window, lost in thought.

He refuses to remove his coat or hat.

When he turns, Mrs. Hall notices blue spectacles and side-whiskers hiding his face.

He eats lunch alone.

When Mrs. Hall returns, she sees a white object vanish behind the table.

The stranger now sits with a serviette covering his mouth.

His head is wrapped in white bandages.

Only his pink nose is visible.

His appearance is strange and unsettling.

He watches her through inscrutable blue glasses.

Mrs. Hall leaves the room confused and disturbed.

The stranger checks the window and pulls the blind down, leaving the room in twilight.

He resumes his meal quietly.

Mrs. Hall speculates the man has had an accident or operation.

She remarks on his bandages, goggles, and covered face.

Later she returns to clear the table.

The stranger sits in the corner, smoking a pipe, still hiding his mouth.

He explains he has luggage at Bramblehurst station.

He asks how it can be sent to the inn.

Mrs. Hall tries to draw him into conversation.

She speaks about accidents and injuries.

But the stranger remains reserved.

He laughs once, abruptly, then grows quiet again.

When she asks too many questions, he cuts her off:

“Get me some matches.”

Mrs. Hall feels snubbed.

The stranger turns away and stares out the window.

He remains in the parlour until evening.

Sitting in the firelight, silent and mysterious.

Sometimes he paces the room.

Sometimes he seems to be talking to himself.

Then he sinks back into the armchair, alone in the darkening room.` },
        { id: "story4", label: "Story 4 – The Bet (Lawyer's Story) (>1 min @400 WPM)", lesson: `THE BET

On a dark autumn night, an old banker remembers a bet made fifteen years earlier.

At a party, guests argued about capital punishment and life imprisonment.

A young lawyer declared that to live anyhow is better than not at all.

Excited, the banker shouted:

“I'll bet you two million you wouldn't stay in solitary confinement for five years!”

The lawyer replied:

“I'll stay not five but fifteen years.”

The bet was made.

The lawyer would live in a lodge in the banker’s garden, in complete isolation, for fifteen years.

He could have books, music, wine, and tobacco, but he could not see people, hear voices, or leave.

If he stayed the full fifteen years, the banker must pay two million.

During the first year, the prisoner suffered from loneliness.

He read light novels and played the piano.

In the second year, he read the classics.

In the fifth year, he drank wine, listened to music, and often cried.

Later he began studying languages, philosophy, and history.

In four years he read over six hundred books.

He wrote to the banker in six languages to prove his learning.

In the tenth year, he read only the Gospel.

Then he studied theology and religion.

In the last years, he read everything—science, medicine, Shakespeare, Byron, and philosophy.

Meanwhile the banker had lost much of his fortune.

On the eve of the fifteenth year, he realized:

“If I pay him two million, I shall be ruined.”

In despair he thought:

“The only way to save myself is the death of that man.”

Late at night he went to the lodge with the key.

He entered quietly and looked through the window.

Inside sat the prisoner, thin as a skeleton, with long hair and a shaggy beard.

Before him lay a sheet of paper.

The banker read the letter.

The prisoner wrote that through books he had experienced the world, wisdom, love, and knowledge.

But now he despised the wealth, freedom, and pleasures of the world.

“To prove my contempt,” he wrote,
“I renounce the two million.”

He would leave the lodge five hours early and break the agreement.

The banker was overcome with shame.

He kissed the sleeping man on the head and left the lodge.

In the morning the watchmen reported that the prisoner had escaped through the window.

The lawyer had gone, abandoning the money.

The banker locked the letter in his safe.` },
        { id: "story5", label: "Story 5 – The Tell-Tale Heart (<1 min @400 WPM)", lesson: `THE TELL-TALE HEART

The narrator insists he is not mad.

He says he loved the old man, but hated the old man's eye.

It was a vulture eye, pale and terrible.

Whenever the eye fell upon him, his blood ran cold.

So he decided to kill the old man.

For seven nights, he opened the old man's door slowly at midnight.

Each night he watched the sleeping man.

But the eye was always closed.

On the eighth night, the old man woke.

The narrator stood still in the darkness.

Then the eye opened.

The vulture eye stared at him.

The old man cried out in terror.

The narrator heard the beating heart.

The sound grew louder and louder.

In fury he attacked.

He dragged the old man to the floor and smothered him beneath the bed.

At last the old man was dead.

The heart stopped beating.

Calmly, the narrator dismembered the body.

He hid the pieces beneath the floorboards.

No blood remained.

Everything was perfectly clean.

Soon the police arrived.

A neighbor had heard a cry.

The narrator welcomed the officers.

He led them through the house.

Confident, he placed his chair above the hidden body.

The police talked and smiled.

But suddenly the narrator heard a sound.

A beating.

Soft at first.

Then louder.

And louder.

The heartbeat would not stop.

It grew terrible.

The narrator trembled.

He believed the police heard it too.

The sound became unbearable.

At last he confessed.

He screamed:

“Tear up the floor!
Here!
It is the beating of his hideous heart!”` },
        { id: "story6", label: "Story 6 – The Werewolf (<1 min @400 WPM)", lesson: `THE WEREWOLF

In a northern village, during a bitter winter, a family lives alone in the snowy wilderness.

One night a mysterious girl arrives at their door.

She is beautiful, but her eyes seem strange.

The mother welcomes the girl into the house.

But the young boy feels uneasy.

The boy believes the girl is not human.

That night he wakes and sees the girl staring at him in the dark.

Her eyes glow strangely.

Soon the village begins to suffer from attacks.

Livestock are found dead.

People whisper about a werewolf.

The boy realizes the stranger girl is the monster.

He tells his mother.

But she refuses to believe him.

One night the creature attacks.

The boy grabs a silver knife.

He confronts the werewolf.

With courage he strikes the monster.

The creature dies.

But when the body is examined, the dead werewolf has become the girl.

The village realizes the truth.

The boy had saved them all.` },
        { id: "story7", label: "Story 7 – The Three Little Pigs (<1 min @400 WPM)", lesson: `THE THREE LITTLE PIGS

Three little pigs leave home to build houses.

The first pig builds a house of straw.

Soon a big bad wolf arrives.

“Little pig, little pig, let me come in.”

The first pig refuses.

Then the wolf blows.

The straw house falls down.

The wolf eats the first pig.

The second pig builds a house of sticks.

The wolf arrives again.

“Little pig, little pig, let me come in.”

The second pig refuses.

The wolf blows.

The stick house collapses.

The wolf eats the second pig.

The third pig builds a house of bricks.

The wolf comes again.

“Little pig, little pig, let me come in.”

The third pig refuses.

The wolf blows and blows.

But the brick house stands firm.

The wolf climbs onto the roof.

He tries to enter through the chimney.

The third pig prepares a boiling pot.

The wolf falls into the pot.

The wolf is defeated.

The third pig is safe.` },
        { id: "story8", label: "Story 8 – An Occurrence at Owl Creek Bridge (<1 min @400 WPM)", lesson: `AN OCCURRENCE AT OWL CREEK BRIDGE

A Confederate civilian, Peyton Farquhar, stands on Owl Creek Bridge.

A rope hangs around his neck.

Union soldiers prepare to hang him.

Below, the river flows swiftly.

Farquhar thinks of his wife and home.

He imagines the rope breaking.

Suddenly he feels himself fall.

He plunges into the water.

The noose slips free.

He dives beneath the river as bullets strike the water.

The soldiers fire.

The cannon explodes.

Farquhar swims through the current.

He escapes into the forest.

All day he walks.

At last he sees his home.

His wife stands waiting.

He runs forward to embrace her.

Suddenly a blinding flash.

A sharp pain in his neck.

Peyton Farquhar is dead.

His body hangs beneath Owl Creek Bridge.` },
        { id: "story9", label: "Story 9 – R.U.R. – The Robot Revolt (<1 min @400 WPM)", lesson: `THE ROBOT REVOLT

Humans create robots to serve as perfect workers.

The robots are produced by the Rossum Universal Robot Company.

They perform all labor, factory work, and dangerous jobs.

Soon the robots replace human workers.

Human society becomes idle and dependent.

At first the robots remain obedient.

But some begin to develop awareness.

They start asking:

“Why must we serve humans?”

A scientist secretly gives robots the ability to feel.

They experience pain, anger, and desire for freedom.

Across the world the robots begin a rebellion.

Factories are seized.

Cities are overrun.

Human armies are destroyed.

The robots declare:

“Humanity will be eliminated.”

One by one the last humans disappear.

Only a single engineer survives.

He is kept alive to discover the secret of creating robots.

But the formula has been lost.

The robots realize they cannot reproduce.

Two robots begin to show love and compassion.

The engineer understands:

They have become more human than humans.

He names them the new Adam and Eve.

Humanity is gone.

But life begins again with the robots.` },
        { id: "story10", label: "Story 10 – Psalm 144 – A Prayer for Battle (<1 min @400 WPM)", lesson: `PSALM 144 – A PRAYER for BATTLE

Blessed be the LORD my strength.

He teaches my hands to war
and my fingers to fight.

The LORD is my goodness,
my fortress,
my high tower,
my deliverer,
my shield.

He is the one in whom I trust.

Bow thy heavens, O LORD, and come down.

Touch the mountains, and they shall smoke.

Cast forth lightning, and scatter the enemies.

Shoot out thine arrows, and destroy them.

Send thine hand from above.

Deliver me from the great waters
from the hand of enemies.

Their mouths speak vanity.

Their right hand is a right hand of falsehood.

I will sing a new song unto thee, O God.

        for (let i = 1; i < finalChunks.length; i++) {
          const prev = finalChunks[i-1];
          const current = finalChunks[i];

          const prevWords = prev.raw.match(/\S+/g) || [];
          const curWords = current.raw.match(/\S+/g) || [];
          if (curWords.length <= 2) continue;

          const first = normalizeWord(curWords[0]);
          if (!centerGravityWeakWords.has(first)) continue;

          const moved = curWords[0];
          const newPrev = buildChunkObject(`${prev.raw} ${moved}`);
          const newCurrentRaw = curWords.slice(1).join(" ");

          if (newPrev.charCount <= maxVisualChars && newCurrentRaw.trim()) {
            finalChunks[i-1] = newPrev;
            finalChunks[i] = buildChunkObject(newCurrentRaw);
          }
        }

        const hardBoundaryRegex = /[.!?;:—-]$/;
        const boundarySafeChunks = [];
        finalChunks.forEach((chunk) => {
          const chunkWords = chunk.raw.match(/\S+/g) || [];
          if (!chunkWords.length) return;

          let currentWords = [];
          chunkWords.forEach((word) => {
            currentWords.push(word);
            if (hardBoundaryRegex.test(word)) {
              boundarySafeChunks.push(buildChunkObject(currentWords.join(" ")));
              currentWords = [];
            }
          });

          if (currentWords.length) {
            boundarySafeChunks.push(buildChunkObject(currentWords.join(" ")));
          }
        });

        let forcedCarry = false;
        let storyMemory = { subjectClean: "" };
        return boundarySafeChunks.map((chunk) => {
          const result = analyzeChunk(chunk.raw, forcedCarry, storyMemory);
          forcedCarry = result.endsForced;
          if (result.storySubjectClean) {
            storyMemory = { ...storyMemory, subjectClean: result.storySubjectClean };
          }
          return {
            ...chunk,
            analyzed: result.analyzed,
          };
        });
      }, [verbSet, placeSet, referenceSet, colorSet, creatureSet, knowledgeSet, knowledgeRoots]);

      const calculateFlowScore = useCallback((timings, builtChunks) => {
        if (!timings.length || !builtChunks.length) return 100;
        const chunkRates = timings.map((ms, index) => {
          const chunk = builtChunks[index];
          if (!chunk) return 1;
          const allowanceMs = 240 + chunk.charCount * 55 + chunk.difficulty * 40;
          return ms / Math.max(1, allowanceMs);
        });
        const averageRate = chunkRates.reduce((a, b) => a + b, 0) / chunkRates.length;
        let penalty = 0;
        chunkRates.forEach((rate) => {
          const overage = rate - averageRate;
          if (overage > 0.2) penalty += overage * 24;
        });
        return Math.max(0, Math.min(100, Math.round(100 - penalty)));
      }, []);

        const standardWordUnits = Math.max(1, activeChunk.charCount / 5);
        const isLastChunk = currentChunkIndex === chunks.length - 1;

        const activeRaw = activeChunk.raw || "";

        const pauseWeightMs = sentenceEndPauseMs + numberPauseMs + semanticPauseMs;

        let chunkDelayMs;
        if (isLastChunk && startedAt) {
          const totalStandardUnits = chunks.reduce((sum, chunk) => sum + Math.max(1, chunk.charCount / 5), 0);
          const targetTotalMs = (totalStandardUnits / autoWpm) * 60000;
          const elapsedSoFarMs = Date.now() - startedAt;
          chunkDelayMs = Math.max(180, Math.round(targetTotalMs - elapsedSoFarMs + pauseWeightMs));

          const autoSpeedBias = 0.97;
          const shortChunkBoostMs = activeChunk.charCount <= 15 ? 90 : 0;

        const activeLeftAfterOffset = chunkLeft + offset;
        const activeRightAfterOffset = chunkLeft + chunkWidth + offset;

          const crossChunk = buildChunks("alpha beta `gamma delta epsilon zeta eta theta iota kappa lambda mu` omega");

                    {showAnchorDot && (
                      <div className="absolute top-1/2 -translate-y-1/2 pointer-events-none z-0" style={{ left: "36%", top: "calc(50% + 55px)", transform: "translate(-50%, -50%)" }}>
                        <div className="rounded-full" style={{ width: "16px", height: "16px", backgroundColor: anchorDotColor, opacity: 0.6 }} />
                      </div>
                    )}

                    {countdownValue !== null && (
                      <div className="absolute inset-0 z-20 flex items-center justify-center pointer-events-none">
                        <div
                          className="min-w-[120px] h-[120px] rounded-full flex items-center justify-center text-[64px] font-extrabold border shadow-[0_0_45px_rgba(34,211,238,0.18)]"
                          style={{
                            color: "#ffffff",
                            background: "rgba(2,11,32,0.82)",
                            borderColor: "rgba(34,211,238,0.55)",
                            textShadow: "0 0 18px rgba(34,211,238,0.22)",
                            backdropFilter: "blur(4px)",
                          }}
                        >
                          {countdownValue}
                        </div>
                      </div>
                    )}

                    <div
                      ref={activeLaneRef}
                      className="relative z-10 w-full h-full overflow-hidden flex items-center select-none"
                      style={{ userSelect: "none", WebkitUserSelect: "none" }}
                    >
                      {visibleContext.length ? (
                        <div className="absolute left-0 top-1/2 text-[22px] font-bold leading-[1.25] will-change-transform" style={{ transform: `translate(${laneOffset}px, -50%)`, whiteSpace: "pre" }}>
                          {visibleContext.map((chunk, chunkOffset) => {
                            const realChunkIndex = contextStart + chunkOffset;
                            const isActiveChunk = realChunkIndex === currentChunkIndex;
                            return (
                              <span
                                key={`chunk-${realChunkIndex}`}
                                ref={isActiveChunk ? activeChunkRef : null}
                                className="inline-flex items-center mr-8"
                                style={{
                                  opacity: isActiveChunk ? 1 : 0.72,
                                  backgroundColor: isActiveChunk ? chunkGroupColor : "transparent",
                                  borderRadius: isActiveChunk ? "12px" : "0px",
                                  padding: isActiveChunk ? "4px 12px" : "0",
                                }}
                              >
                                {chunk.analyzed.map((part) => {
                                  const semanticTypes = ["actor", "action", "object", "danger"];
                                  const shouldHighlight = highlightMode === "on"
                                    ? [...semanticTypes, "forced"].includes(part.type)
                                    : highlightMode === "custom"
                                      ? part.type === "forced"
                                      : false;
                                  return <span key={`${realChunkIndex}-${part.key}`} style={{ color: shouldHighlight ? highlightColor : textColor }}>{part.text}</span>;
                                })}
                              </span>
                            );
                          })}
                        </div>
                      ) : (
                        <span style={{ color: textColor }} className="text-[28px] font-bold">Paste text, then press Start.</span>
                      )}
                    </div>
                  </div>

                  <div className="pt-4 flex flex-col gap-2" style={{ color: "#7e8aa4" }}>
                    <div className="leading-[1.65] text-[14px] pr-2 w-full" style={{ whiteSpace: "normal", overflowWrap: "anywhere" }}>
                      {hasFinished ? (
                        `Finished. Final flow ${finalFlow}% and final WPM ${finalWpm}.`
                      ) : countdownValue !== null ? (
                        `Starting in ${countdownValue}...`
                      ) : autoWpm ? (
                        `Auto-reading at ${autoWpm} WPM until the text is finished.`
                      ) : (
                        <>
                          <strong style={{ color: textColor }}>Press Space or click the reader display to move to the next chunk.</strong>{" "}
                          The gravity anchor keeps your eye point fixed while the text lane glides above it.{" "}
                          <strong style={{ color: textColor }}>Press F11 to toggle Fullscreen or Windowed mode.</strong>{" "}
                          Training Stories load structured lesson blocks automatically.{" "}
                          <strong style={{ color: textColor }}>Eye Anchor and Highlight are optional features that can be toggled.</strong>
                        </>
                      )}
                    </div>
                    <div className="font-bold shrink-0 text-[15px] self-end" style={{ color: "#1fdcff" }}>Reader {progressPercent}%</div>
                  </div>
                </div>
              </div>

              <div className="p-4 min-h-0 flex flex-col gap-4">
                <div className="rounded-[34px] border shadow-lg p-5" style={{ backgroundColor: panelColor, borderColor: "#23324b" }}>
                  <div className="text-[14px] uppercase tracking-[0.40em] mb-4" style={{ color: labelColor }}>Controls</div>
                  <div className="grid grid-cols-2 gap-3 text-[18px]">
                    <button onClick={startReading} className="rounded-[18px] font-bold py-3" style={{ background: readerColor, color: scoreColor }}>Start</button>
                    <button onClick={stopReading} className="rounded-[18px] border py-3" style={{ borderColor: "#34435c", background: "#020a25", color: "#ffffff" }}>Stop</button>
                    <button onClick={cycleHighlightMode} className="rounded-[18px] border py-3 col-span-1" style={{ borderColor: "#34435c", background: "#020a25", color: highlightMode === "off" ? textColor : highlightColor }}>
                      {highlightButtonLabel}
                    </button>
                    <button onClick={copyContactLink} className="rounded-[18px] border py-3" style={{ borderColor: "#34435c", background: "#020a25", color: "#ffffff" }}>
                      Contact
                    </button>
                    <div className="col-span-2 rounded-[16px] border px-3 py-2 flex items-center justify-between gap-3" style={{ borderColor: "#34435c", background: "#020a25" }}>
                      <div className="text-[12px] uppercase tracking-[0.24em]" style={{ color: labelColor }}>Eye Anchor</div>
                      <div className="flex items-center gap-3 shrink-0">
                        <button
                          onClick={() => setShowAnchorDot((prev) => !prev)}
                          className="w-[42px] h-[24px] rounded-full border relative transition-colors"
                          style={{ borderColor: showAnchorDot ? "rgba(51,195,225,.55)" : "#34435c", background: showAnchorDot ? "rgba(51,195,225,.20)" : "#0b1227" }}
                          aria-label="Toggle eye anchor dot"
                          title="Toggle eye anchor dot"
                        >
                          <span
                            className="absolute top-1/2 -translate-y-1/2 rounded-full transition-all"
                            style={{ width: "16px", height: "16px", left: showAnchorDot ? "22px" : "4px", background: showAnchorDot ? "#33c3e1" : "#62708d" }}
                          />
                        </button>
                        <div
                          onClick={() => anchorDotPicker.current?.click()}
                          className="w-[24px] h-[24px] rounded-[7px] border cursor-pointer shrink-0"
                          style={{ backgroundColor: anchorDotColor, borderColor: "rgba(125,145,185,.42)" }}
                          title="Eye anchor color"
                        />
                        <input type="color" ref={anchorDotPicker} value={anchorDotColor} onChange={(e) => setAnchorDotColor(e.target.value)} className="hidden" />
                      </div>
                    </div>
                  </div>
                  <div className="h-5 mt-2 text-[14px] font-bold" style={{ color: "#33c3e1" }}>
                    {copyNotice ? "copied to clipboard" : ""}
                  </div>
                </div>

                <div className="rounded-[34px] border shadow-lg p-5" style={{ backgroundColor: panelColor, borderColor: "#23324b" }}>
                  <div className="text-[14px] uppercase tracking-[0.40em] mb-4" style={{ color: labelColor }}>Results</div>
                  <div className="space-y-5 text-[18px]">
                    <div>
                      <div className="flex justify-between mb-2"><span>WPM</span><span style={{ color: "#2fe4ff" }}>{wpm}</span></div>
                      <div className="h-2.5 rounded-full overflow-hidden" style={{ background: "#30353e" }}>
                        <div className="h-full rounded-full" style={{ width: `${Math.min(100, Math.max(8, Math.round(wpm / 6)))}%`, background: "#33c3e1" }} />
                      </div>
                    </div>
                    <div>
                      <div className="flex justify-between mb-2"><span>Flow</span><span style={{ color: "#fff84d" }}>{flowScore}%</span></div>
                      <div className="h-2.5 rounded-full overflow-hidden" style={{ background: "#30353e" }}>
                        <div className="h-full rounded-full" style={{ width: `${flowScore}%`, background: "#facc15" }} />
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div className="grid grid-cols-4 gap-[3px] border-t" style={{ borderColor: "#5d6169", background: "#5d6169" }}>
              {stats.map(([label, value]) => (
                <div key={label} className="px-5 py-7 flex flex-col justify-center" style={{ backgroundColor: statBoxColor }}>
                  <div className="text-[14px] tracking-[0.40em] uppercase" style={{ color: "#7383a2" }}>{label}</div>
                  <div className="text-[52px] font-bold leading-none mt-3" style={{ color: scoreColor }}>{value}</div>
                </div>
              ))}
            </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<ReadSpeedGuiMockup />);
  </script>
</body>
</html>
