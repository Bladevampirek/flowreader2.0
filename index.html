<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flow Reader</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; background: #000; }
    textarea::-webkit-scrollbar { width: 8px; }
    textarea::-webkit-scrollbar-thumb { background: rgba(120,130,160,.4); border-radius: 99px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useCallback, useEffect, useLayoutEffect, useMemo, useRef, useState } = React;

    function ReadSpeedGuiMockup() {
      const [inputText, setInputText] = useState("");
      const [textColor, setTextColor] = useState("#ffffff");
      const [highlightColor, setHighlightColor] = useState("#facc15");
      const [chunkGroupColor, setChunkGroupColor] = useState("#14324a");
      const [readerColor, setReaderColor] = useState("#22d3ee");
      const [bgColor, setBgColor] = useState("#18181b");
      const [panelColor, setPanelColor] = useState("#111827");
      const [statBoxColor, setStatBoxColor] = useState("#d1d5db");
      const [labelColor, setLabelColor] = useState("#7c89a5");
      const [scoreColor, setScoreColor] = useState("#000000");

      const [isRunning, setIsRunning] = useState(false);
      const [highlightMode, setHighlightMode] = useState("on");
      const [chunks, setChunks] = useState([]);
      const [currentChunkIndex, setCurrentChunkIndex] = useState(0);
      const [startedAt, setStartedAt] = useState(null);
      const [elapsedMs, setElapsedMs] = useState(0);
      const [laneOffset, setLaneOffset] = useState(0);
      const [chunkTimings, setChunkTimings] = useState([]);
      const [chunkStartedAt, setChunkStartedAt] = useState(null);
      const [finalWpm, setFinalWpm] = useState(0);
      const [finalFlow, setFinalFlow] = useState(100);
      const [hasFinished, setHasFinished] = useState(false);
      const [autoWpm, setAutoWpm] = useState(null);
      const [copyNotice, setCopyNotice] = useState(false);
      const [showAnchorDot, setShowAnchorDot] = useState(true);
      const [anchorDotColor, setAnchorDotColor] = useState("#22d3ee");

      const textPicker = useRef(null);
      const highlightPicker = useRef(null);
      const chunkGroupPicker = useRef(null);
      const readerPicker = useRef(null);
      const bgPicker = useRef(null);
      const panelPicker = useRef(null);
      const labelPicker = useRef(null);
      const statBoxPicker = useRef(null);
      const scorePicker = useRef(null);
      const anchorDotPicker = useRef(null);
      const activeChunkRef = useRef(null);
      const activeLaneRef = useRef(null);
      const autoAdvanceTimeoutRef = useRef(null);
      const autoModeRef = useRef(false);
      const copyNoticeTimeoutRef = useRef(null);
      const appShellRef = useRef(null);

      const verbSet = useMemo(() => new Set([
        "is", "are", "was", "were", "be", "being", "been", "am", "do", "does", "did", "done",
        "have", "has", "had", "go", "goes", "went", "gone", "run", "runs", "ran", "walk", "walks",
        "walked", "say", "says", "said", "see", "sees", "saw", "seen", "look", "looks", "looked",
        "find", "finds", "found", "make", "makes", "made", "take", "takes", "took", "taken", "felt",
        "feel", "feels", "read", "reads", "reading", "think", "thinks", "thought", "lived", "live",
        "lives", "moved", "move", "moves", "sat", "sit", "sits", "stood", "stand", "stands", "entered",
        "enter", "enters", "left", "leave", "leaves", "arrived", "arrive", "arrives", "opened", "open",
        "climbed", "climb", "climbs", "watched", "watch", "watches", "turned", "turn", "turns"
      ]), []);

      const placeSet = useMemo(() => new Set([
        "school", "park", "city", "town", "village", "house", "home", "road", "street", "forest", "woods",
        "river", "lake", "mountain", "store", "church", "beach", "room", "kitchen", "yard", "office",
        "factory", "kentucky", "brownsville", "leitchfield", "bowling", "green", "america", "usa"
      ]), []);

      const colorSet = useMemo(() => new Set([
        "red", "blue", "green", "yellow", "orange", "purple", "violet", "pink", "brown", "black", "white", "gray", "grey", "gold", "silver", "cyan", "magenta"
      ]), []);

      const referenceSet = useMemo(() => new Set([
        "i", "me", "my", "mine", "myself", "we", "us", "our", "ours", "ourselves",
        "you", "your", "yours", "yourself", "yourselves",
        "he", "him", "his", "himself", "she", "her", "hers", "herself",
        "they", "them", "their", "theirs", "themselves",
        "it", "its", "itself"
      ]), []);

      const creatureSet = useMemo(() => new Set([
        "dog", "dogs", "wolf", "wolves", "cat", "cats", "bird", "birds", "horse", "horses", "cow", "cows",
        "bear", "bears", "lion", "lions", "tiger", "tigers", "fox", "foxes", "deer", "rabbit", "rabbits",
        "snake", "snakes", "dragon", "dragons", "wyvern", "wyverns", "griffin", "griffins", "gryphon", "gryphons",
        "phoenix", "phoenixes", "unicorn", "unicorns", "goblin", "goblins", "orc", "orcs", "elf", "elves",
        "dwarf", "dwarves", "troll", "trolls", "giant", "giants", "fairy", "fairies", "vampire", "vampires",
        "werewolf", "werewolves", "zombie", "zombies", "ghost", "ghosts", "spider", "spiders", "shark", "sharks"
      ]), []);

      const knowledgeSet = useMemo(() => new Set([
        "know", "knows", "knew", "known", "knowing",
        "knowledge", "knowledgeable",
        "remember", "remembers", "remembered", "remembering",
        "forget", "forgets", "forgot", "forgotten", "forgetting",
        "understand", "understands", "understood", "understanding",
        "learn", "learns", "learned", "learning",
        "realize", "realizes", "realized", "realizing"
      ]), []);

      const knowledgeRoots = useMemo(() => ["know", "forget", "remember", "understand", "learn", "realiz"], []);

      useEffect(() => {
        if (!isRunning || !startedAt) return;
        const timer = setInterval(() => setElapsedMs(Date.now() - startedAt), 100);
        return () => clearInterval(timer);
      }, [isRunning, startedAt]);

      useEffect(() => {
        return () => {
          if (copyNoticeTimeoutRef.current) clearTimeout(copyNoticeTimeoutRef.current);
        };
      }, []);

      const [isFullscreen, setIsFullscreen] = useState(false);

      const toggleFullscreen = useCallback(async () => {
        try {
          if (!document.fullscreenElement) {
            await (appShellRef.current || document.documentElement).requestFullscreen();
          } else {
            await document.exitFullscreen();
          }
        } catch (err) {
          // Ignore fullscreen errors in unsupported environments.
        }
      }, []);

      useEffect(() => {
        const syncFullscreenState = () => {
          setIsFullscreen(Boolean(document.fullscreenElement));
        };

        document.addEventListener("fullscreenchange", syncFullscreenState);
        return () => document.removeEventListener("fullscreenchange", syncFullscreenState);
      }, []);

      const normalizeWord = (word) => (word || "").toLowerCase().replace(/^[^a-zA-Z]+|[^a-zA-Z]+$/g, "");

      const analyzeChunk = (chunkText, initialForcedHighlight = false) => {
        const parts = chunkText.match(/\S+|\s+/g) || [];
        let subjectChosen = false;
        let insideForcedHighlight = initialForcedHighlight;

        const analyzed = parts.map((part, index) => {
          if (/^\s+$/.test(part)) {
            return { text: part, type: insideForcedHighlight ? "forced" : "space", key: `${index}-${part}` };
          }

          const tickCount = (part.match(/`/g) || []).length;
          const shouldForceThisPart = insideForcedHighlight || tickCount > 0;
          const cleanedPart = part.replace(/`/g, "");

          const clean = normalizeWord(cleanedPart);
          const isVerb = verbSet.has(clean);
          const isReference = referenceSet.has(clean);
          const isPronounI = clean === "i";
          const isPlace = placeSet.has(clean);
          const isColor = colorSet.has(clean);
          const isCreature = creatureSet.has(clean);
          const isKnowledge = knowledgeSet.has(clean) || knowledgeRoots.some((root) => clean.startsWith(root));
          const isNumber = /[0-9]/.test(cleanedPart);
          const isPotentialSubject = !subjectChosen && !!clean && !isVerb && !isPlace && !["the", "a", "an", "and", "but", "or", "if", "then", "because", "into", "onto", "with", "from"].includes(clean);

          let type = "normal";
          if (shouldForceThisPart) type = "forced";
          else if (isNumber) type = "number";
          else if (isColor) type = "color";
          else if (isPronounI) type = "subject";
          else if (isReference) type = "reference";
          else if (isCreature) type = "creature";
          else if (isKnowledge) type = "knowledge";
          else if (isPlace) type = "place";
          else if (isVerb) type = "verb";
          else if (isPotentialSubject) {
            type = "subject";
            subjectChosen = true;
          }

          if (tickCount % 2 === 1) insideForcedHighlight = !insideForcedHighlight;

          return { text: cleanedPart, type, key: `${index}-${cleanedPart}` };
        });

        return { analyzed, endsForced: insideForcedHighlight };
      };

      const buildChunkObject = (raw) => {
        const chunkWords = (raw.match(/\S+/g) || []);
        const wordLengths = chunkWords.map((w) => normalizeWord(w).length || w.length || 1);
        const difficulty = wordLengths.reduce((sum, len) => sum + Math.max(0, len - 4), 0);

        return {
          raw,
          charCount: raw.length,
          wordCount: chunkWords.length,
          avgWordLength: wordLengths.length ? wordLengths.reduce((a, b) => a + b, 0) / wordLengths.length : 0,
          difficulty,
        };
      };

      const buildChunks = useCallback((text) => {
        const sourceWords = (text || "").trim().split(/\s+/).filter(Boolean);
        if (!sourceWords.length) return [];

        const connectorSet = new Set([
          "the", "a", "an", "and", "but", "or", "if", "then", "because", "about", "with", "to", "of", "in", "on", "for", "from", "that", "this", "these", "those", "at", "by"
        ]);

        const maxVisualChars = 24;

        const words = [];
        sourceWords.forEach((word) => {
          if (word.length <= maxVisualChars) {
            words.push(word);
            return;
          }

          let remainingWord = word;
          while (remainingWord.length > maxVisualChars) {
            words.push(remainingWord.slice(0, maxVisualChars));
            remainingWord = remainingWord.slice(maxVisualChars);
          }
          if (remainingWord.length) words.push(remainingWord);
        });

        if (!words.length) return [];

        const isSemanticallyDangerous = (word) => {
          const clean = normalizeWord(word);
          return (
            !clean || connectorSet.has(clean) || verbSet.has(clean) || placeSet.has(clean) ||
            referenceSet.has(clean) || colorSet.has(clean) || creatureSet.has(clean) || knowledgeSet.has(clean) ||
            knowledgeRoots.some((root) => clean.startsWith(root)) || /[0-9]/.test(word)
          );
        };

        const slices = [];
        let i = 0;

        while (i < words.length) {
          let size = 6;
          const firstWord = words[i] || "";
          if (firstWord.length >= 10) size = 5;
          if (firstWord.length <= 3) size = 7;

          let end = Math.min(i + size, words.length);

          while (end < words.length) {
            const lastWord = normalizeWord(words[end - 1]);
            if (connectorSet.has(lastWord)) {
              const proposedLen = words.slice(i, end + 1).join(" ").length;
              if (proposedLen > maxVisualChars) break;
              end += 1;
              continue;
            }
            break;
          }

          for (let scan = i; scan < end; scan += 1) {
            if (/[.!?]$/.test(words[scan])) {
              end = scan + 1;
              break;
            }
          }

          for (let scan = end - 1; scan > i + 2; scan -= 1) {
            if (/[.,;:]$/.test(words[scan])) {
              const tailAfterBreak = words.length - (scan + 1);
              if (tailAfterBreak === 0 || tailAfterBreak >= 3) {
                end = scan + 1;
                break;
              }
            }
          }

          while (end - i > 4 && words.slice(i, end).join(" ").length > maxVisualChars) {
            end -= 1;
            while (end - i > 4 && connectorSet.has(normalizeWord(words[end - 1]))) end -= 1;
          }

          if (end - i < 2 && end < words.length) end = Math.min(i + 2, words.length);

          const remaining = words.length - end;
          if (remaining > 0 && remaining <= 2) end = words.length;

          slices.push({ start: i, end });
          i = end;
        }

        for (let idx = 0; idx < slices.length - 1; idx += 1) {
          const current = slices[idx];
          const next = slices[idx + 1];

          const currentText = words.slice(current.start, current.end).join(" ");
          const nextText = words.slice(next.start, next.end).join(" ");
          const currentLen = currentText.length;
          const nextLen = nextText.length;

          if (Math.abs(currentLen - nextLen) < 10) continue;
          if (currentLen > maxVisualChars || nextLen > maxVisualChars) continue;

          if (currentLen > nextLen && current.end - current.start > 4) {
            const movedWord = words[current.end - 1];
            const newBoundaryWord = words[current.end - 2] || "";
            if (!isSemanticallyDangerous(movedWord) && !connectorSet.has(normalizeWord(newBoundaryWord))) {
              current.end -= 1;
              next.start -= 1;
            }
          } else if (nextLen > currentLen && next.end - next.start > 4) {
            const movedWord = words[next.start];
            const newBoundaryWord = words[next.start + 1] || "";
            const proposedLen = words.slice(current.start, current.end + 1).join(" ").length;
            if (proposedLen <= maxVisualChars && !isSemanticallyDangerous(movedWord) && !connectorSet.has(normalizeWord(newBoundaryWord))) {
              current.end += 1;
              next.start += 1;
            }
          }

          while (idx < slices.length - 1) {
            const safeCurrentLen = words.slice(current.start, current.end).join(" ").length;
            if (safeCurrentLen <= maxVisualChars || current.end - current.start <= 4) break;

            const movedWord = words[current.end - 1];
            const newBoundaryWord = words[current.end - 2] || "";
            if (isSemanticallyDangerous(movedWord) || connectorSet.has(normalizeWord(newBoundaryWord))) break;

            current.end -= 1;
            next.start -= 1;
          }
        }

        const finalizedSlices = [];
        slices.forEach(({ start, end }) => {
          let localStart = start;
          while (localStart < end) {
            let localEnd = end;
            while (localEnd - localStart > 1 && words.slice(localStart, localEnd).join(" ").length > maxVisualChars) {
              localEnd -= 1;
            }
            finalizedSlices.push({ start: localStart, end: localEnd });
            localStart = localEnd;
          }
        });

        const initialChunks = finalizedSlices.map(({ start, end }) => {
          const raw = words.slice(start, end).join(" ");
          return buildChunkObject(raw);
        });

        const minChunkChars = 15;
        const mergedChunks = [];
        for (let idx = 0; idx < initialChunks.length; idx += 1) {
          const current = initialChunks[idx];
          if (current.charCount < minChunkChars && idx < initialChunks.length - 1) {
            const mergedRaw = `${current.raw} ${initialChunks[idx + 1].raw}`;
            mergedChunks.push(buildChunkObject(mergedRaw));
            idx += 1;
          } else {
            mergedChunks.push(current);
          }
        }

        let forcedCarry = false;
        return mergedChunks.map((chunk) => {
          const result = analyzeChunk(chunk.raw, forcedCarry);
          forcedCarry = result.endsForced;
          return {
            ...chunk,
            analyzed: result.analyzed,
          };
        });
      }, [verbSet, placeSet, referenceSet, colorSet, creatureSet, knowledgeSet, knowledgeRoots]);

      const calculateFlowScore = useCallback((timings, builtChunks) => {
        if (!timings.length || !builtChunks.length) return 100;
        const chunkRates = timings.map((ms, index) => {
          const chunk = builtChunks[index];
          if (!chunk) return 1;
          const allowanceMs = 240 + chunk.charCount * 55 + chunk.difficulty * 40;
          return ms / Math.max(1, allowanceMs);
        });
        const averageRate = chunkRates.reduce((a, b) => a + b, 0) / chunkRates.length;
        let penalty = 0;
        chunkRates.forEach((rate) => {
          const overage = rate - averageRate;
          if (overage > 0.2) penalty += overage * 24;
        });
        return Math.max(0, Math.min(100, Math.round(100 - penalty)));
      }, []);

      const clearAutoAdvanceTimeout = useCallback(() => {
        if (autoAdvanceTimeoutRef.current) {
          window.clearTimeout(autoAdvanceTimeoutRef.current);
          autoAdvanceTimeoutRef.current = null;
        }
      }, []);

      const triggerAutoAdvance = useCallback(() => {
        const event = new KeyboardEvent("keydown", {
          code: "Space",
          key: " ",
          bubbles: true,
          cancelable: true,
        });
        window.dispatchEvent(event);
      }, []);

      const finishReading = useCallback((timingsOverride, builtChunks, elapsedOverride) => {
        const totalChars = builtChunks.reduce((sum, chunk) => sum + chunk.charCount, 0);
        const computedWpm = autoWpm ? autoWpm : (elapsedOverride > 0 ? Math.round((totalChars / 5) / (elapsedOverride / 60000)) : 0);
        const computedFlow = calculateFlowScore(timingsOverride, builtChunks);
        setFinalWpm(computedWpm);
        setFinalFlow(computedFlow);
        setHasFinished(true);
        setIsRunning(false);
        setAutoWpm(null);
        autoModeRef.current = false;
        clearAutoAdvanceTimeout();
      }, [autoWpm, calculateFlowScore, clearAutoAdvanceTimeout]);

      const advanceChunk = useCallback(() => {
        if (!isRunning || chunks.length === 0) return;

        const now = Date.now();
        const timeOnChunk = chunkStartedAt ? now - chunkStartedAt : 0;
        const nextTimings = [...chunkTimings, timeOnChunk];

        if (currentChunkIndex >= chunks.length - 1) {
          const totalElapsed = startedAt ? now - startedAt : elapsedMs;
          setElapsedMs(totalElapsed);
          setChunkTimings(nextTimings);
          finishReading(nextTimings, chunks, totalElapsed);
          return;
        }

        setChunkTimings(nextTimings);
        setCurrentChunkIndex((prev) => Math.min(prev + 1, chunks.length - 1));
        setChunkStartedAt(now);
      }, [isRunning, chunks, chunkStartedAt, chunkTimings, currentChunkIndex, startedAt, elapsedMs, finishReading]);

      const startReading = useCallback(() => {
        const built = buildChunks(inputText);
        setChunks(built);
        setCurrentChunkIndex(0);
        setLaneOffset(0);
        const now = Date.now();
        setStartedAt(now);
        setChunkStartedAt(now);
        setChunkTimings([]);
        setFinalWpm(0);
        setFinalFlow(100);
        setHasFinished(false);
        setElapsedMs(0);
        setAutoWpm(null);
        autoModeRef.current = false;
        clearAutoAdvanceTimeout();
        setIsRunning(built.length > 0);
      }, [buildChunks, inputText, clearAutoAdvanceTimeout]);

      const startAutoRead = useCallback((wpmTarget) => {
        const built = buildChunks(inputText);
        setChunks(built);
        setCurrentChunkIndex(0);
        setLaneOffset(0);
        const now = Date.now();
        setStartedAt(now);
        setChunkStartedAt(now);
        setChunkTimings([]);
        setFinalWpm(0);
        setFinalFlow(100);
        setHasFinished(false);
        setElapsedMs(0);
        setAutoWpm(wpmTarget);
        autoModeRef.current = true;
        clearAutoAdvanceTimeout();
        setIsRunning(built.length > 0);
      }, [buildChunks, inputText, clearAutoAdvanceTimeout]);

      const stopReading = useCallback(() => {
        setIsRunning(false);
        setAutoWpm(null);
        autoModeRef.current = false;
        clearAutoAdvanceTimeout();
      }, [clearAutoAdvanceTimeout]);

      const clearAll = useCallback(() => {
        setInputText("");
        setChunks([]);
        setCurrentChunkIndex(0);
        setLaneOffset(0);
        setChunkTimings([]);
        setChunkStartedAt(null);
        setFinalWpm(0);
        setFinalFlow(100);
        setHasFinished(false);
        setIsRunning(false);
        setElapsedMs(0);
        setAutoWpm(null);
        autoModeRef.current = false;
        clearAutoAdvanceTimeout();
      }, [clearAutoAdvanceTimeout]);

      const copyContactLink = useCallback(async () => {
        try {
          await navigator.clipboard.writeText("https://discordapp.com/invite/qUymDuc");
          setCopyNotice(true);
          if (copyNoticeTimeoutRef.current) clearTimeout(copyNoticeTimeoutRef.current);
          copyNoticeTimeoutRef.current = setTimeout(() => {
            setCopyNotice(false);
            copyNoticeTimeoutRef.current = null;
          }, 1000);
        } catch (err) {
          setCopyNotice(false);
        }
      }, []);

      useEffect(() => {
        const handleKeyDown = (e) => {
          const target = e.target;
          const isTypingField = target instanceof HTMLElement && (
            target.tagName === "TEXTAREA" ||
            target.tagName === "INPUT" ||
            target.isContentEditable
          );

          if (e.code === "F11") {
            e.preventDefault();
            toggleFullscreen();
            return;
          }

          if (e.code === "Space" && !isTypingField) {
            if (autoModeRef.current) return;
            e.preventDefault();
            advanceChunk();
          }
        };

        window.addEventListener("keydown", handleKeyDown);
        return () => window.removeEventListener("keydown", handleKeyDown);
      }, [advanceChunk, toggleFullscreen]);

      useEffect(() => {
        if (!isRunning || !autoWpm || !chunks.length) return;

        const activeChunk = chunks[currentChunkIndex];
        if (!activeChunk) return;

        const standardWordUnits = Math.max(1, activeChunk.charCount / 5);
        const isLastChunk = currentChunkIndex === chunks.length - 1;

        let chunkDelayMs;
        if (isLastChunk && startedAt) {
          const totalStandardUnits = chunks.reduce((sum, chunk) => sum + Math.max(1, chunk.charCount / 5), 0);
          const targetTotalMs = (totalStandardUnits / autoWpm) * 60000;
          const elapsedSoFarMs = Date.now() - startedAt;
          chunkDelayMs = Math.max(180, Math.round(targetTotalMs - elapsedSoFarMs));
        } else {
          const autoSpeedBias = 0.97;
          const shortChunkBoostMs = activeChunk.charCount <= 15 ? 90 : 0;
          chunkDelayMs = Math.max(180, Math.round((((standardWordUnits / autoWpm) * 60000) * autoSpeedBias) + shortChunkBoostMs));
        }

        autoAdvanceTimeoutRef.current = window.setTimeout(() => {
          const previousAutoMode = autoModeRef.current;
          autoModeRef.current = false;
          triggerAutoAdvance();
          autoModeRef.current = previousAutoMode;
        }, chunkDelayMs);

        return () => {
          if (autoAdvanceTimeoutRef.current) {
            window.clearTimeout(autoAdvanceTimeoutRef.current);
            autoAdvanceTimeoutRef.current = null;
          }
        };
      }, [isRunning, autoWpm, chunks, currentChunkIndex, startedAt, triggerAutoAdvance]);

      useLayoutEffect(() => {
        const laneEl = activeLaneRef.current;
        const chunkEl = activeChunkRef.current;
        if (!laneEl || !chunkEl || !chunks.length) return;

        const laneWidth = laneEl.clientWidth;
        const chunkLeft = chunkEl.offsetLeft;
        const chunkWidth = chunkEl.offsetWidth;
        const targetCenter = laneWidth * 0.36;
        let offset = targetCenter - (chunkLeft + chunkWidth / 2);

        const leftPadding = 14;
        const rightPadding = 14;
        const activeLeftAfterOffset = chunkLeft + offset;
        const activeRightAfterOffset = chunkLeft + chunkWidth + offset;

        if (activeLeftAfterOffset < leftPadding) offset += leftPadding - activeLeftAfterOffset;
        if (activeRightAfterOffset > laneWidth - rightPadding) offset -= activeRightAfterOffset - (laneWidth - rightPadding);

        setLaneOffset(offset);
      }, [currentChunkIndex, chunks, highlightMode]);

      useEffect(() => {
        const tests = () => {
          console.assert(normalizeWord("Hello!") === "hello", "normalizeWord should strip punctuation");
          const forced = analyzeChunk("This is `very important` text");
          console.assert(forced.analyzed.some((part) => part.type === "forced" && part.text.includes("very")), "forced highlight should start at opening tick");
          console.assert(forced.analyzed.some((part) => part.type === "forced" && part.text.includes("important")), "forced highlight should continue to closing tick");
          const crossChunk = buildChunks("alpha beta `gamma delta epsilon zeta eta theta iota kappa lambda mu` omega");
          console.assert(crossChunk.some((chunk) => chunk.analyzed.some((part) => part.type === "forced" && part.text.includes("gamma"))), "forced highlight should include opening chunk");
          console.assert(crossChunk.some((chunk) => chunk.analyzed.some((part) => part.type === "forced" && part.text.includes("theta"))), "forced highlight should carry across chunks");
          const longWordChunks = buildChunks("kkkkkkkkkkkkkkkkkkkkkkkkkkkkkkkkkkkkkkkkkkkk");
          console.assert(longWordChunks.length > 1, "long words should split into multiple chunks");
          if (crossChunk.length > 1) {
            console.assert(crossChunk.slice(0, -1).every((chunk) => chunk.charCount >= 15 || chunk === crossChunk[crossChunk.length - 1]), "non-final chunks should be at least 15 chars");
          }
        };
        tests();
      }, [buildChunks]);

      const visibleChunk = chunks[currentChunkIndex] || null;
      const contextStart = Math.max(0, currentChunkIndex - 3);
      const contextEnd = Math.min(chunks.length, currentChunkIndex + 4);
      const visibleContext = chunks.slice(contextStart, contextEnd);
      const charsRead = chunks.slice(0, currentChunkIndex + (visibleChunk ? 1 : 0)).reduce((sum, chunk) => sum + chunk.charCount, 0);
      const liveWpm = elapsedMs > 0 ? Math.round((charsRead / 5) / (elapsedMs / 60000)) : 0;
      const wpm = hasFinished ? finalWpm : liveWpm;
      const flowScore = hasFinished ? finalFlow : calculateFlowScore(chunkTimings, chunks.slice(0, chunkTimings.length));
      const progressPercent = chunks.length ? Math.round(((currentChunkIndex + 1) / chunks.length) * 100) : 0;

      const stats = [
        ["WPM", String(wpm)],
        ["FLOW", `${flowScore}%`],
        ["BREAKS", String(Math.max(0, chunkTimings.length))],
        ["CAP", `${progressPercent}%`],
      ];

      const topSwatches = [
        [textColor, textPicker, setTextColor, "Text Color"],
        [highlightColor, highlightPicker, setHighlightColor, "Highlight Color"],
        [chunkGroupColor, chunkGroupPicker, setChunkGroupColor, "Chunk Group Color"],
        [readerColor, readerPicker, setReaderColor, "Reader Color"],
        [panelColor, panelPicker, setPanelColor, "Panel Color"],
        [bgColor, bgPicker, setBgColor, "Background Color"],
        [labelColor, labelPicker, setLabelColor, "Label Color"],
        [statBoxColor, statBoxPicker, setStatBoxColor, "Stat Box Color"],
        [scoreColor, scorePicker, setScoreColor, "Score Color"],
      ];

      const cycleHighlightMode = useCallback(() => {
        setHighlightMode((prev) => {
          if (prev === "on") return "off";
          if (prev === "off") return "custom";
          return "on";
        });
      }, []);

      const highlightButtonLabel = highlightMode === "on"
        ? "Highlight On"
        : highlightMode === "off"
          ? "Highlight Off"
          : "HighL:Custom";

      return (
        <div className="min-h-screen bg-black flex items-center justify-center p-4 text-white font-sans">
          <div
            ref={appShellRef}
            className="w-[1120px] h-[720px] border rounded-[30px] overflow-hidden shadow-2xl grid"
            style={{
              backgroundColor: bgColor,
              borderColor: "#2d3748",
              gridTemplateRows: "58px 128px 1fr 126px",
              boxShadow: "0 24px 70px rgba(0,0,0,.45)",
              width: isFullscreen ? "100vw" : "1120px",
              height: isFullscreen ? "100vh" : "720px",
              borderRadius: isFullscreen ? "0px" : "30px",
            }}
          >
            <div className="px-6 border-b flex items-center gap-6" style={{ borderColor: "#273142", background: "linear-gradient(to right, rgba(12,12,18,.98), rgba(20,20,26,.98))" }}>
              <div className="flex items-center gap-6 shrink-0">
                <div className="text-[16px] tracking-[0.40em] uppercase" style={{ color: "#17d6ff" }}>Read Speed System</div>
                <div className="text-[15px]" style={{ color: "#bfc6d4" }}>720 x 480 Compact Layout</div>
              </div>
              <div className="flex-1 flex items-center justify-center min-w-0">
                <a
                  href="https://store.steampowered.com/app/4455850/Speed_Grinder_20/"
                  target="_blank"
                  rel="noreferrer"
                  className="h-[34px] px-5 rounded-full border inline-flex items-center justify-center text-[12px] font-bold tracking-[0.18em] uppercase whitespace-nowrap"
                  style={{ color: scoreColor, textDecoration: "none", borderColor: readerColor, background: readerColor, boxShadow: "inset 0 0 0 1px rgba(255,255,255,.06)" }}
                >
                  More Flow Training Tools
                </a>
              </div>
              <div className="text-[23px] font-bold shrink-0" style={{ color: "#ffffff" }}>Flow Reader</div>
            </div>

            <div className="px-4 py-3 border-b" style={{ borderColor: "#273142", background: "rgba(20,20,26,.92)" }}>
              <div className="h-full rounded-[28px] border px-5 py-3 flex items-start gap-5 min-w-0 overflow-hidden" style={{ borderColor: "rgba(0,170,230,.42)", background: "linear-gradient(to right, #030814, #0c1630)" }}>
                <textarea
                  value={inputText}
                  onChange={(e) => setInputText(e.target.value)}
                  placeholder="Insert Text Here (paste text here)"
                  className="flex-1 min-w-0 h-[82px] resize-none border-0 outline-none bg-transparent text-[18px] leading-tight overflow-auto pt-1"
                  style={{ color: "#bfc9da" }}
                />

                <div className="flex items-center gap-3 shrink-0 pt-2">
                  <div className="grid grid-cols-5 gap-2 w-[138px]">
                    {topSwatches.map(([value, refObj, setter, title], i) => (
                      <React.Fragment key={title}>
                        <div
                          onClick={() => refObj.current?.click()}
                          className="w-6 h-6 rounded-[6px] border cursor-pointer"
                          style={{ backgroundColor: value, borderColor: i < 3 ? "rgba(255,255,255,.18)" : "rgba(125,145,185,.42)" }}
                          title={title}
                        />
                        <input type="color" ref={refObj} value={value} onChange={(e) => setter(e.target.value)} className="hidden" />
                      </React.Fragment>
                    ))}
                  </div>

                  <button
                    onClick={async () => {
                      try {
                        const text = await navigator.clipboard.readText();
                        setInputText(text || "");
                      } catch {
                        document.querySelector("textarea")?.focus();
                      }
                    }}
                    className="px-6 h-[46px] rounded-[18px] border text-[17px]"
                    style={{ borderColor: "#34435c", background: "#030a25", color: "#ffffff" }}
                  >
                    Paste
                  </button>
                  <button onClick={startReading} className="px-8 h-[46px] rounded-[18px] text-[17px] font-bold" style={{ background: readerColor, color: scoreColor }}>Start</button>
                  <button onClick={toggleFullscreen} className="px-5 h-[46px] rounded-[18px] border text-[16px] font-bold" style={{ borderColor: "#34435c", background: "#030a25", color: isFullscreen ? readerColor : "#ffffff" }}>
                    {isFullscreen ? "Windowed" : "Fullscreen"}
                  </button>
                  <button onClick={clearAll} className="px-6 h-[46px] rounded-[18px] border text-[17px]" style={{ borderColor: "#34435c", background: "#030a25", color: "#ffffff" }}>Clear</button>
                </div>
              </div>
            </div>

            <div className="grid grid-cols-[1.95fr_0.95fr] min-h-0" style={{ background: "rgba(14,15,22,.95)" }}>
              <div className="p-4 border-r min-h-0" style={{ borderColor: "#273142" }}>
                <div className="h-full rounded-[34px] border min-h-0 flex flex-col px-6 py-5" style={{ backgroundColor: panelColor, borderColor: "#23324b", boxShadow: "inset 0 0 0 1px rgba(0,120,220,.05)" }}>
                  <div className="flex items-center justify-between gap-4 mb-4">
                    <div className="text-[10px] uppercase tracking-[0.45em] shrink-0" style={{ color: labelColor }}>Reader Display</div>
                    <div className="flex items-center gap-2 flex-1 justify-center">
                      {[200, 400, 600, 800].map((speed) => {
                        const isActiveSpeed = autoWpm === speed && isRunning;
                        return (
                          <button
                            key={speed}
                            onClick={() => startAutoRead(speed)}
                            className="px-3 h-[30px] rounded-[10px] border text-[12px] font-bold whitespace-nowrap"
                            style={{
                              borderColor: isActiveSpeed ? "rgba(51,195,225,.65)" : "#34435c",
                              background: isActiveSpeed ? "rgba(51,195,225,.16)" : "#020a25",
                              color: isActiveSpeed ? "#33c3e1" : "#c7d2e3",
                            }}
                          >
                            {speed}wpm
                          </button>
                        );
                      })}
                    </div>
                    <div className="text-[15px] px-3 py-1 rounded-full border font-bold shrink-0" style={{ color: "#ffd400", borderColor: "rgba(250,204,21,.45)", backgroundColor: "rgba(250,204,21,.06)" }}>
                      {hasFinished ? "Complete" : isRunning ? (autoWpm ? `${autoWpm} WPM` : "Live") : "Ready"}
                    </div>
                  </div>

                  <div onClick={() => { if (!autoModeRef.current) advanceChunk(); }} className="flex-1 min-h-0 mt-1 rounded-[32px] border px-6 flex items-center overflow-hidden relative cursor-pointer" style={{ borderColor: "#39435a", background: "#020b20" }}>
                    {showAnchorDot && (
                      <div className="absolute top-1/2 -translate-y-1/2 pointer-events-none z-0" style={{ left: "36%", top: "calc(50% + 55px)", transform: "translate(-50%, -50%)" }}>
                        <div className="rounded-full" style={{ width: "16px", height: "16px", backgroundColor: anchorDotColor, opacity: 0.6 }} />
                      </div>
                    )}

                    <div ref={activeLaneRef} className="relative z-10 w-full h-full overflow-hidden flex items-center">
                      {visibleContext.length ? (
                        <div className="absolute left-0 top-1/2 text-[22px] font-bold leading-[1.25] will-change-transform" style={{ transform: `translate(${laneOffset}px, -50%)`, whiteSpace: "pre" }}>
                          {visibleContext.map((chunk, chunkOffset) => {
                            const realChunkIndex = contextStart + chunkOffset;
                            const isActiveChunk = realChunkIndex === currentChunkIndex;
                            return (
                              <span
                                key={`chunk-${realChunkIndex}`}
                                ref={isActiveChunk ? activeChunkRef : null}
                                className="inline-flex items-center mr-8"
                                style={{
                                  opacity: isActiveChunk ? 1 : 0.72,
                                  backgroundColor: isActiveChunk ? chunkGroupColor : "transparent",
                                  borderRadius: isActiveChunk ? "12px" : "0px",
                                  padding: isActiveChunk ? "4px 12px" : "0",
                                }}
                              >
                                {chunk.analyzed.map((part) => {
                                  const semanticTypes = ["subject", "verb", "place", "color", "number", "reference", "creature", "knowledge"];
                                  const shouldHighlight = highlightMode === "on"
                                    ? [...semanticTypes, "forced"].includes(part.type)
                                    : highlightMode === "custom"
                                      ? part.type === "forced"
                                      : false;
                                  return <span key={`${realChunkIndex}-${part.key}`} style={{ color: shouldHighlight ? highlightColor : textColor }}>{part.text}</span>;
                                })}
                              </span>
                            );
                          })}
                        </div>
                      ) : (
                        <span style={{ color: textColor }} className="text-[28px] font-bold">Paste text, then press Start.</span>
                      )}
                    </div>
                  </div>

                  <div className="pt-4 text-[15px] flex items-end justify-between gap-5" style={{ color: "#7e8aa4" }}>
                    <div className="max-w-[78%] leading-[1.6]">
                      {hasFinished ? `Finished. Final flow ${finalFlow}% and final WPM ${finalWpm}.` : autoWpm ? `Auto-reading at ${autoWpm} WPM until the text is finished.` : "Press Space for next chunk. The gravity anchor holds your eye point while the text lane glides above it. Press F11 to toggle Fullscreen."}
                    </div>
                    <div className="font-bold shrink-0 text-[15px]" style={{ color: "#1fdcff" }}>Reader {progressPercent}%</div>
                  </div>
                </div>
              </div>

              <div className="p-4 min-h-0 flex flex-col gap-4">
                <div className="rounded-[34px] border shadow-lg p-5" style={{ backgroundColor: panelColor, borderColor: "#23324b" }}>
                  <div className="text-[14px] uppercase tracking-[0.40em] mb-4" style={{ color: labelColor }}>Controls</div>
                  <div className="grid grid-cols-2 gap-3 text-[18px]">
                    <button onClick={startReading} className="rounded-[18px] font-bold py-3" style={{ background: readerColor, color: scoreColor }}>Start</button>
                    <button onClick={stopReading} className="rounded-[18px] border py-3" style={{ borderColor: "#34435c", background: "#020a25", color: "#ffffff" }}>Stop</button>
                    <button onClick={cycleHighlightMode} className="rounded-[18px] border py-3 col-span-1" style={{ borderColor: "#34435c", background: "#020a25", color: highlightMode === "off" ? textColor : highlightColor }}>
                      {highlightButtonLabel}
                    </button>
                    <button onClick={copyContactLink} className="rounded-[18px] border py-3" style={{ borderColor: "#34435c", background: "#020a25", color: "#ffffff" }}>
                      Contact
                    </button>
                    <div className="col-span-2 rounded-[16px] border px-3 py-2 flex items-center justify-between gap-3" style={{ borderColor: "#34435c", background: "#020a25" }}>
                      <div className="text-[12px] uppercase tracking-[0.24em]" style={{ color: labelColor }}>Eye Anchor</div>
                      <div className="flex items-center gap-3 shrink-0">
                        <button
                          onClick={() => setShowAnchorDot((prev) => !prev)}
                          className="w-[42px] h-[24px] rounded-full border relative transition-colors"
                          style={{ borderColor: showAnchorDot ? "rgba(51,195,225,.55)" : "#34435c", background: showAnchorDot ? "rgba(51,195,225,.20)" : "#0b1227" }}
                          aria-label="Toggle eye anchor dot"
                          title="Toggle eye anchor dot"
                        >
                          <span
                            className="absolute top-1/2 -translate-y-1/2 rounded-full transition-all"
                            style={{ width: "16px", height: "16px", left: showAnchorDot ? "22px" : "4px", background: showAnchorDot ? "#33c3e1" : "#62708d" }}
                          />
                        </button>
                        <div
                          onClick={() => anchorDotPicker.current?.click()}
                          className="w-[24px] h-[24px] rounded-[7px] border cursor-pointer shrink-0"
                          style={{ backgroundColor: anchorDotColor, borderColor: "rgba(125,145,185,.42)" }}
                          title="Eye anchor color"
                        />
                        <input type="color" ref={anchorDotPicker} value={anchorDotColor} onChange={(e) => setAnchorDotColor(e.target.value)} className="hidden" />
                      </div>
                    </div>
                  </div>
                  <div className="h-5 mt-2 text-[14px] font-bold" style={{ color: "#33c3e1" }}>
                    {copyNotice ? "copied to clipboard" : ""}
                  </div>
                </div>

                <div className="rounded-[34px] border shadow-lg p-5" style={{ backgroundColor: panelColor, borderColor: "#23324b" }}>
                  <div className="text-[14px] uppercase tracking-[0.40em] mb-4" style={{ color: labelColor }}>Results</div>
                  <div className="space-y-5 text-[18px]">
                    <div>
                      <div className="flex justify-between mb-2"><span>WPM</span><span style={{ color: "#2fe4ff" }}>{wpm}</span></div>
                      <div className="h-2.5 rounded-full overflow-hidden" style={{ background: "#30353e" }}>
                        <div className="h-full rounded-full" style={{ width: `${Math.min(100, Math.max(8, Math.round(wpm / 6)))}%`, background: "#33c3e1" }} />
                      </div>
                    </div>
                    <div>
                      <div className="flex justify-between mb-2"><span>Flow</span><span style={{ color: "#fff84d" }}>{flowScore}%</span></div>
                      <div className="h-2.5 rounded-full overflow-hidden" style={{ background: "#30353e" }}>
                        <div className="h-full rounded-full" style={{ width: `${flowScore}%`, background: "#facc15" }} />
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div className="grid grid-cols-4 gap-[3px] border-t" style={{ borderColor: "#5d6169", background: "#5d6169" }}>
              {stats.map(([label, value]) => (
                <div key={label} className="px-5 py-7 flex flex-col justify-center" style={{ backgroundColor: statBoxColor }}>
                  <div className="text-[14px] tracking-[0.40em] uppercase" style={{ color: "#7383a2" }}>{label}</div>
                  <div className="text-[52px] font-bold leading-none mt-3" style={{ color: scoreColor }}>{value}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<ReadSpeedGuiMockup />);
  </script>
</body>
</html>
